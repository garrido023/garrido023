name: Generate Bart Simpson Animation

on:
  schedule:
    # Se ejecuta cada 12 horas (en el minuto 0 para no gastar minutos de más)
    - cron: "0 */12 * * *"
  
  workflow_dispatch: # Permite ejecutarlo a mano

  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Genera la animación con los colores de Bart Simpson
      - name: generate-snake-game-from-github-contribution-grid
        uses: platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#fed90f&color_dots=#ebedf0,#bfd3f2,#4d7298,#2a4858,#1b262c
          # #fed90f es el amarillo Bart
          # Los azules son para que los cuadritos parezcan sus pantalones
          
      # Sube los archivos a la rama 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
